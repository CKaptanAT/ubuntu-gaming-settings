vm.swappiness = 1
#vm.swappiness is set to 1 for fast systems with large memory capacity. Increase incrementally up to 100 depending on your own system.
#The other settings below would be expected to perform well in all setups.
vm.vfs_cache_pressure = 50
vm.dirty_bytes = 1073741824
vm.dirty_background_bytes = 268435456
vm.dirty_writeback_centisecs = 750
vm.max_map_count = 16777216
kernel.nmi_watchdog = 0
net.core.netdev_max_backlog = 4096
net.core.somaxconn = 8192
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.ipv4.tcp_fastopen = 3
fs.file-max = 2097152
kernel.sched_autogroup_enabled = 1
vm.compaction_proactiveness = 0
kernel.perf_event_paranoid = 1
